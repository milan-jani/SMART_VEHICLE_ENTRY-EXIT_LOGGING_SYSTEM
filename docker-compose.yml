# ──────────────────────────────────────────────────
# Docker Compose - Raspberry Pi Deployment
# ──────────────────────────────────────────────────

services:
  backend:
    build: .
    container_name: vehicle-logging-backend
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - API_BASE_URL=http://localhost:8000

  camera:
    build: .
    container_name: vehicle-logging-camera
    restart: unless-stopped
    depends_on:
      - backend
    network_mode: "host"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - API_BASE_URL=http://localhost:8000
      - DISPLAY=:0
    devices:
      - /dev/video0:/dev/video0
      - /dev/video1:/dev/video1
    privileged: true
    # This command starts the camera runner
    command: python -m app.device.device_runner
